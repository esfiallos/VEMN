<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#080810">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>Dramaturge</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/menu-additions.css">
</head>
<body>

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  DRAMATURGE — index.html de PRODUCCIÓN                   ║
    ║                                                          ║
    ║  Solo viven aquí los elementos estructurales fijos.      ║
    ║  Los paneles secundarios (slots, ajustes, audio, modal,  ║
    ║  loading, toast) son creados por MenuSystem en body.     ║
    ║                                                          ║
    ║  Capas (z-index):                                        ║
    ║    1   #viewport / canvas PIXI                           ║
    ║    50  #hud                                              ║
    ║    60  #pause-menu                                       ║
    ║    100 #main-menu                                        ║
    ║    800+ paneles dinámicos (MenuSystem)                   ║
    ╚══════════════════════════════════════════════════════════╝
    -->

    <!-- ── VIEWPORT (canvas PIXI + overlay de juego) ─────────────────────── -->
    <div id="viewport">

        <!-- Canvas PIXI se inyecta aquí por Renderer.init() -->

        <!-- Puzzle overlay -->
        <div id="puzzle-overlay">
            <div id="puzzle-card">
                <div id="puzzle-title"></div>
                <div id="puzzle-desc"></div>
                <div id="puzzle-interaction"></div>
            </div>
        </div>

        <!-- Textbox + avance por clic -->
        <div id="click-zone">
            <div id="text-box">
                <div id="char-name"></div>
                <p id="char-text"></p>
            </div>
        </div>

        <!-- HUD en juego -->
        <div id="hud">
            <!-- Lado izquierdo: info de la partida -->
            <div id="hud-info">
                <span id="hud-title"></span>
                <span id="hud-scene"></span>
                <span id="hud-playtime"></span>
            </div>
            <!-- Lado derecho: acciones -->
            <button class="hud-btn" id="btn-backlog" title="Historial (L)">Historial</button>
            <button class="hud-btn" id="btn-auto">Auto</button>
            <button class="hud-btn" id="btn-skip">Skip</button>
            <button class="hud-btn" id="btn-save">Guardar</button>
            <button class="hud-btn" id="btn-pause">Pausa</button>
            <button class="hud-btn hud-btn--exit" id="btn-exit">Salir</button>
        </div>

        <!-- Overlay de transición entre escenas -->
        <div id="scene-transition"></div>

    </div><!-- /#viewport -->


    <!-- ── MENÚ DE PAUSA ─────────────────────────────────────────────────── -->
    <!--
        Solo botones. Los paneles que abre (slots, ajustes)
        son creados por MenuSystem directamente en body.
    -->
    <div id="pause-menu">
        <div class="menu-card" id="pause-card">
            <div class="menu-card-title">— Pausa —</div>
            <div id="pause-buttons">
                <button class="btn-gold" id="btn-resume">Continuar</button>
                <button class="btn-gold" id="btn-save-slot">Guardar partida</button>
                <button class="btn-gold" id="btn-load-slot">Cargar partida</button>
                <div class="ornament">·</div>
                <button class="btn-gold" id="btn-settings">Audio</button>
                <div class="ornament">·</div>
                <button class="btn-gold" id="btn-main-menu">Menú principal</button>
            </div>
        </div>
    </div>


    <!-- ── MENÚ PRINCIPAL (splash) ───────────────────────────────────────── -->
    <div id="main-menu">

        <div id="menu-top">
            <p id="menu-eyebrow">Novela Visual</p>
            <h1 id="menu-title">DRAMATURGE</h1>
            <p id="menu-subtitle">Cada secreto tiene su precio</p>
        </div>

        <div id="menu-bottom">
            <div id="menu-buttons">
                <button class="btn-gold" id="btn-new-game">Nueva Partida</button>
                <button class="btn-gold" id="btn-gallery">Galería</button>
                <button class="btn-gold" id="btn-load">Cargar Partida</button>
            </div>
            <p id="menu-version">Dramaturge · v0.1.0</p>
        </div>

    </div>


    <!-- Indicador de rotar pantalla — solo visible en portrait+touch -->
    <div id="rotate-hint">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="12" width="24" height="32" rx="3"/>
            <path d="M36 8 L40 12 L36 16"/>
            <path d="M40 12 H28"/>
        </svg>
        <p>Gira tu dispositivo</p>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
