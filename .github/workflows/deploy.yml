# .github/workflows/deploy.yml
# Se ejecuta en cada push a main.
# Construye el proyecto y lo despliega en GitHub Pages automáticamente.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez — si llega otro push, cancela el anterior
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4