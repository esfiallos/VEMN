<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emers Studio — Dev Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & tokens ─────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base:      #080810;
            --bg-panel:     #0e0e1a;
            --bg-editor:    #07070f;
            --border:       #1c1c30;
            --border-glow:  #2a2a50;
            --gold:         #e8a045;
            --gold-dim:     rgba(232, 160, 69, 0.12);
            --gold-line:    rgba(232, 160, 69, 0.25);

            /* Syntax colors */
            --syn-keyword:  #e8a045;   /* pawn, show, hide, bg.set */
            --syn-actor:    #7dd3fc;   /* nombres de personaje */
            --syn-pose:     #5eead4;   /* :neutral, :triste */
            --syn-string:   #86efac;   /* "texto de diálogo" */
            --syn-vo:       #fb923c;   /* [001] */
            --syn-slot:     #c084fc;   /* left, center, right */
            --syn-effect:   #818cf8;   /* fade, slide */
            --syn-comment:  #3d4060;   /* # comentario */
            --syn-time:     #f472b6;   /* 2s, 500ms */

            --text-primary: #e2e2f0;
            --text-dim:     #4a4a70;
            --text-muted:   #2a2a45;

            --status-ok:    #34d399;
            --status-warn:  #fbbf24;
            --status-err:   #f87171;

            --font-code: 'JetBrains Mono', monospace;
            --font-ui:   'Outfit', sans-serif;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-ui);
            overflow: hidden;
        }

        /* ── Layout principal ───────────────────────────────────────────── */
        #lab-root {
            display: grid;
            grid-template-rows: 42px 1fr;
            grid-template-columns: 1fr;
            height: 100vh;
        }

        /* ── Header ─────────────────────────────────────────────────────── */
        #lab-header {
            grid-row: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            user-select: none;
        }

        .lab-logo {
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .lab-logo span {
            color: var(--text-dim);
            font-weight: 300;
        }

        .header-sep {
            width: 1px;
            height: 18px;
            background: var(--border);
        }

        #engine-badge {
            font-family: var(--font-code);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 2px;
            background: var(--gold-dim);
            color: var(--gold);
            border: 1px solid var(--gold-line);
            letter-spacing: 0.05em;
        }

        .header-spacer { flex: 1; }

        /* Run button */
        #btn-run {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            height: 28px;
            background: var(--gold);
            color: #080810;
            border: none;
            border-radius: 3px;
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        #btn-run:hover  { opacity: 0.85; }
        #btn-run:active { transform: scale(0.97); }
        #btn-run .icon  { font-size: 13px; line-height: 1; }

        #btn-reset {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            height: 28px;
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: var(--font-code);
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        #btn-reset:hover { color: var(--text-primary); border-color: var(--border-glow); }

        /* ── Body de 3 columnas ─────────────────────────────────────────── */
        #lab-body {
            grid-row: 2;
            display: grid;
            grid-template-columns: 340px 1fr 300px;
            overflow: hidden;
        }

        /* ── Panel genérico ─────────────────────────────────────────────── */
        .panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            height: 32px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }

        .panel-title {
            font-family: var(--font-code);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .panel-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        .panel-dot.active { background: var(--status-ok); box-shadow: 0 0 6px var(--status-ok); }
        .panel-dot.warn   { background: var(--status-warn); }

        /* ── COLUMNA 1: Editor ──────────────────────────────────────────── */
        #panel-editor {
            background: var(--bg-editor);
        }

        .editor-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            height: 28px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }

        .file-tab {
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--gold);
            padding: 0 10px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            border-right: 1px solid var(--border);
        }
        .file-tab::before {
            content: '●';
            color: var(--gold);
            font-size: 6px;
        }

        /* Editor: textarea transparente + div de highlight superpuesto */
        .editor-wrap {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        /* El div de highlight y el textarea comparten el mismo scroll y fuente */
        #ems-highlight, #ems-editor {
            position: absolute;
            inset: 0;
            font-family: var(--font-code);
            font-size: 13px;
            line-height: 1.75;
            padding: 16px 16px 16px 48px; /* espacio para números de línea */
            tab-size: 4;
            white-space: pre;
            overflow: auto;
            word-wrap: normal;
        }

        /* La capa de highlight: solo visual */
        #ems-highlight {
            color: transparent;
            pointer-events: none;
            z-index: 1;
            border: none;
            background: transparent;
        }
        #ems-highlight .hl-line {
            display: block;
            min-height: 1.75em;
        }

        /* El textarea: captura input, texto invisible (color transparent) */
        #ems-editor {
            background: transparent;
            color: transparent;
            caret-color: var(--gold);
            border: none;
            outline: none;
            resize: none;
            z-index: 2;
            spellcheck: false;
        }

        /* Números de línea */
        #line-numbers {
            position: absolute;
            top: 0; left: 0;
            width: 40px;
            padding: 16px 0;
            font-family: var(--font-code);
            font-size: 13px;
            line-height: 1.75;
            text-align: right;
            padding-right: 8px;
            color: var(--text-muted);
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
            user-select: none;
        }

        /* Línea activa (cursor) */
        .active-line-bg {
            background: rgba(232, 160, 69, 0.04);
        }

        /* ── COLUMNA 2: Viewport ────────────────────────────────────────── */
        #panel-viewport {
            border-right: 1px solid var(--border);
        }

        #emers-viewport {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        /* Overlay de texto — DEBE existir con estos IDs para MERenderer */
        #click-zone {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 30;
            padding: 20px;
        }

        #text-box {
            background: rgba(0, 0, 0, 0.88);
            border: 1px solid rgba(232, 160, 69, 0.4);
            padding: 16px 20px;
            border-radius: 4px;
            min-height: 100px;
            transition: all 0.5s ease;
        }

        #char-name {
            font-family: var(--font-ui);
            font-size: 15px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        #char-text {
            font-family: var(--font-ui);
            font-size: 15px;
            line-height: 1.6;
            color: #d4d4e8;
        }

        /* Modo narración (activado por MERenderer) */
        #text-box.narration-mode {
            position: absolute;
            inset: 0;
            border-radius: 0;
            border: none;
            background: rgba(0, 0, 0, 0.82);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10% 12%;
            margin: 0;
        }
        #text-box.narration-mode #char-name { display: none; }
        #text-box.narration-mode #char-text {
            font-style: italic;
            font-size: 1.3rem;
            line-height: 1.8;
            max-width: 600px;
        }

        /* Hint de clic */
        #viewport-hint {
            position: absolute;
            top: 10px; right: 12px;
            z-index: 35;
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--text-dim);
            pointer-events: none;
        }

        /* ── COLUMNA 3: Debug ───────────────────────────────────────────── */
        #panel-debug {
            border-right: none;
            background: var(--bg-panel);
        }

        #debug-log {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .log-entry {
            display: flex;
            gap: 8px;
            padding: 3px 0;
            font-family: var(--font-code);
            font-size: 10.5px;
            line-height: 1.5;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .log-time  { color: var(--text-muted); flex-shrink: 0; }
        .log-info  { color: #5a5a90; }
        .log-ok    { color: var(--status-ok); }
        .log-warn  { color: var(--status-warn); }
        .log-error { color: var(--status-err); }

        /* Inspector de estado */
        #panel-state {
            height: 200px;
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #state-inspector {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: var(--font-code);
            font-size: 10px;
            line-height: 1.6;
            color: #5a7a9a;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* JSON coloring básico */
        #state-inspector .json-key    { color: #7dd3fc; }
        #state-inspector .json-str    { color: #86efac; }
        #state-inspector .json-num    { color: #fb923c; }
        #state-inspector .json-bool   { color: #c084fc; }
        #state-inspector .json-null   { color: var(--text-dim); }

        /* Barra de instrucciones activa */
        #instruction-bar {
            height: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            border-top: 1px solid var(--border);
            background: var(--bg-base);
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--text-dim);
        }
        .ibar-label { color: var(--text-muted); }
        .ibar-type  { color: var(--gold); font-weight: 700; }
        .ibar-idx   { color: var(--text-dim); }

        /* Scrollbars globales */
        ::-webkit-scrollbar       { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Puzzle Overlay ─────────────────────────────────────────────── */
        /*
            Vive dentro de #emers-viewport, encima del canvas PIXI (z-5)
            y encima del textbox (z-30). z-index: 40.
            Se activa añadiendo la clase 'active'.
        */
        #puzzle-overlay {
            position: absolute;
            inset: 0;
            z-index: 40;
            background: rgba(4, 4, 12, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #puzzle-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        #puzzle-card {
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--gold-line);
            background: var(--bg-panel);
            padding: 28px 28px 24px;
        }

        #puzzle-title {
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        #puzzle-desc {
            font-family: var(--font-ui);
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 22px;
        }

        #puzzle-interaction {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .puzzle-btn {
            width: 100%;
            padding: 10px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            border-radius: 2px;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }

        .puzzle-btn:hover {
            border-color: var(--gold-line);
            background: var(--gold-dim);
            color: var(--gold);
        }

        .puzzle-btn--confirm,
        .puzzle-btn--continue {
            text-align: center;
            border-color: var(--gold-line);
            color: var(--gold);
            margin-top: 4px;
        }

        .puzzle-btn--confirm:hover,
        .puzzle-btn--continue:hover {
            background: var(--gold);
            color: var(--bg-base);
        }

        .puzzle-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-editor);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text-primary);
            font-family: var(--font-code);
            font-size: 14px;
            outline: none;
            caret-color: var(--gold);
            transition: border-color 0.15s;
        }

        .puzzle-input:focus { border-color: var(--gold-line); }

        .puzzle-result {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 2px;
            font-family: var(--font-ui);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .puzzle-result--pass {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--status-ok);
        }

        .puzzle-result--fail {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--status-err);
        }

        .result-icon {
            font-size: 20px;
            line-height: 1;
        }
    </style>
</head>
<body>
<div id="lab-root">

    <!-- ── HEADER ─────────────────────────────────────────────────────────── -->
    <header id="lab-header">
        <div class="lab-logo">Emers <span>Studio</span></div>
        <div class="header-sep"></div>
        <span id="engine-badge">DEV LAB</span>
        <div class="header-spacer"></div>
        <button id="btn-reset">↺ Reset</button>
        <button id="btn-run"><span class="icon">▶</span> Run</button>
    </header>

    <!-- ── BODY ───────────────────────────────────────────────────────────── -->
    <div id="lab-body">

        <!-- COLUMNA 1: Editor .ems -->
        <div class="panel" id="panel-editor">
            <div class="panel-header">
                <div class="panel-dot warn" id="editor-dot"></div>
                <span class="panel-title">Script Editor</span>
            </div>
            <div class="editor-meta">
                <div class="file-tab">scene_test.ems</div>
            </div>
            <div class="editor-wrap">
                <div id="line-numbers"></div>
                <div id="ems-highlight" aria-hidden="true"></div>
                <textarea
                    id="ems-editor"
                    spellcheck="false"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                ></textarea>
            </div>
        </div>

        <!-- COLUMNA 2: Viewport -->
        <div class="panel" id="panel-viewport">
            <div class="panel-header">
                <div class="panel-dot" id="viewport-dot"></div>
                <span class="panel-title">Viewport</span>
                <div style="flex:1"></div>
                <span style="font-family:var(--font-code);font-size:10px;color:var(--text-muted)" id="step-counter">— / —</span>
            </div>
            <div id="emers-viewport">
                <!-- El canvas de PIXI se inyecta aquí por MERenderer.init() -->
                <!-- El overlay de texto DEBE estar aquí con estos IDs exactos -->
                <!-- Puzzle overlay — activado por PuzzleSystem.open() -->
                <div id="puzzle-overlay">
                    <div id="puzzle-card">
                        <div id="puzzle-title"></div>
                        <div id="puzzle-desc"></div>
                        <div id="puzzle-interaction"></div>
                    </div>
                </div>

                <div id="click-zone">
                    <div id="text-box">
                        <div id="char-name">Sistema</div>
                        <p id="char-text">Presiona ▶ Run para compilar y ejecutar el script.</p>
                    </div>
                </div>
                <div id="viewport-hint">CLICK TO ADVANCE</div>
            </div>
        </div>

        <!-- COLUMNA 3: Debug -->
        <div class="panel" id="panel-debug">
            <div class="panel-header">
                <div class="panel-dot" id="debug-dot"></div>
                <span class="panel-title">Console</span>
            </div>
            <div id="debug-log"></div>

            <div id="panel-state">
                <div class="panel-header" style="border-top:1px solid var(--border);height:28px;">
                    <span class="panel-title">State</span>
                </div>
                <pre id="state-inspector"></pre>
            </div>

            <div id="instruction-bar">
                <span class="ibar-label">INST</span>
                <span class="ibar-type" id="ib-type">—</span>
                <div style="flex:1"></div>
                <span class="ibar-idx" id="ib-idx">0 / 0</span>
            </div>
        </div>

    </div>
</div>

<script type="module" src="./lab.js"></script>
</body>
</html>
